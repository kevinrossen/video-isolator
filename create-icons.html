<!DOCTYPE html>
<html>
<head>
  <style>
    canvas { border: 1px solid #ccc; margin: 10px; }
  </style>
</head>
<body>
  <h3>Right-click each canvas and "Save image as..." with the specified filename</h3>
  
  <div>
    <p>Save as icon16.png:</p>
    <canvas id="icon16" width="16" height="16"></canvas>
  </div>
  
  <div>
    <p>Save as icon48.png:</p>
    <canvas id="icon48" width="48" height="48"></canvas>
  </div>
  
  <div>
    <p>Save as icon128.png:</p>
    <canvas id="icon128" width="128" height="128"></canvas>
  </div>

  <script>
    function drawIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      
      // Background
      ctx.fillStyle = '#4CAF50';
      ctx.fillRect(0, 0, size, size);
      
      // Play triangle
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.moveTo(size * 0.35, size * 0.25);
      ctx.lineTo(size * 0.35, size * 0.75);
      ctx.lineTo(size * 0.7, size * 0.5);
      ctx.closePath();
      ctx.fill();
    }
    
    drawIcon('icon16', 16);
    drawIcon('icon48', 48);
    drawIcon('icon128', 128);
  </script>
</body>
</html>
